name: "1 MW orbital multimodal-inference cluster"
kind: space
mission_life_years: 5
accelerator: h100_sxm
utilization: 0.85
sustained_fraction: 0.55
discount_rate: 0.08

workload:
  # Rich-artifact return (embeddings/images/multimodal): comm intensity is high
  # (~2e-6 bits/FLOP, derived). This is the regime where the downlink bandwidth
  # binds; contrast with orbital_1mw_inference.yaml (text output, un-binds).
  type: multimodal_inference

space:
  orbit:
    type: dawn_dusk_sso
    altitude_km: 650.0
  architecture:
    satellites: 64
    accelerators_per_satellite: 18
    crosslink: optical
    crosslink_gbps: 50000.0
    downlink_gbps: 200.0
    radiator_area_m2_per_sat: 45.0
  it_power_overhead_frac: 0.25
  non_it_power_frac: 0.10
  solar_array: rigid_triple_junction
  battery: li_ion_generic
  launch: current_reusable
  # Thermal radiator co-design.
  radiator_panel: deployable_osr
  coolant: ammonia_single_phase
  chip_stack: h100_direct_liquid
  thermal_environment: conservative_leo
  thermal_eol: true
  annual_failure_rate: 0.05
  spare_fraction: 0.05
  reset_recovery_availability: 0.99
