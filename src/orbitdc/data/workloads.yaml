# Workload library: communication intensity (bits moved off-accelerator per FLOP
# of delivered compute). The SPEC's space-native vs Earth-dependent distinction.
# Written as plain decimals (PyYAML parses unsigned-exponent floats as strings).

llm_inference:
  comm_intensity_bits_per_flop:
