# Accelerator catalog.
# peak_tflops_dense is DENSE tensor throughput at `precision`. The widely quoted
# H100 figures (1979 FP16 / 3958 FP8 TFLOPS) assume 2:4 structured sparsity;
# dense is half. We store dense and flag sparsity support separately.

h100_sxm:
  name: "NVIDIA H100 SXM"
  precision: "fp16"
  sparsity_supported: true
  tdp_w:
    value: 700.0
    units: "W"
    source: "NVIDIA H100 datasheet (configurable TDP up to 700 W)"
    date: "2026-06-13"
    confidence: "high"
    kind: "vendor"
  peak_tflops_dense:
    value: 989.0
    units: "TFLOP/s"
    source: "NVIDIA H100 datasheet: dense FP16 tensor = 989 TFLOPS (1979 with 2:4 sparsity)"
    date: "2026-06-13"
    confidence: "high"
    kind: "vendor"
  memory_gb:
    value: 80.0
    units: "GB"
    source: "NVIDIA H100 SXM datasheet"
    date: "2026-06-13"
    confidence: "high"
    kind: "vendor"
  mem_bw_tb_s:
    value: 3.35
    units: "TB/s"
    source: "NVIDIA H100 SXM datasheet"
    date: "2026-06-13"
    confidence: "high"
    kind: "vendor"
  mass_kg:
    value: 1.5
    units: "kg"
    source: "Estimated board+module share; SXM module mass not published"
    date: "2026-06-13"
    confidence: "low"
    kind: "estimated"
  unit_cost_usd:
    value: 25000.0
    units: "USD"
    source: "Estimated street price, 2025-2026"
    date: "2026-06-13"
    confidence: "low"
    kind: "estimated"
  tid_tolerance_krad:
    value: 20.0
    units: "krad"
    source: "Commercial silicon is radiation-soft; estimate before TID degradation"
    date: "2026-06-13"
    confidence: "low"
    kind: "estimated"
  seu_susceptibility: 1.0
  ecc_mitigation:
    value: 0.80
    units: "fraction"
    source: "HBM ECC + scrubbing mitigates most soft errors"
    date: "2026-06-13"
    confidence: "low"
    kind: "estimated"

