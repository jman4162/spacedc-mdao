# Coarse orbit-binned radiation environment (EQUATIONS section 10).
# Shielded TID and a relative SEU flux that rise with altitude (toward the inner
# Van Allen belt) and inclination (SAA / polar exposure). LOW confidence: actual
# dose varies 1-2 orders of magnitude with solar activity, shielding, and SAA
# passes. Use as a sensitivity driver, not a headline claim.

leo:
  source: "Qualitative shielded-LEO TID/SEU trend; order-of-magnitude only"
  confidence: "low"
  kind: "speculative"
  altitude_km: [300, 500, 650, 800, 1000, 1500, 2000]
  tid_krad_per_year: [0.3, 0.6, 1.0, 2.0, 5.0, 30.0, 80.0]
  seu_relative: [0.5, 0.8, 1.0, 1.3, 2.0, 5.0, 10.0]
  seu_base_rate_per_year: 0.03
