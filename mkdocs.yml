site_name: spacedc-mdao
site_description: Multidisciplinary design analysis and optimization of orbital compute infrastructure.
site_url: https://jman4162.github.io/spacedc-mdao/
repo_url: https://github.com/jman4162/spacedc-mdao
repo_name: jman4162/spacedc-mdao
edit_uri: ""

theme:
  name: material
  palette:
    - scheme: default
      primary: deep purple
      toggle:
        icon: material/weather-night
        name: Dark mode
    - scheme: slate
      primary: deep purple
      toggle:
        icon: material/weather-sunny
        name: Light mode
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - toc.integrate

nav:
  - Home: index.md
  - Quick start: quickstart.md
  - User tiers: tiers.md
  - Model architecture: architecture.md
  - vs the McCalip calculator: vs-mccalip.md
  - Governing equations: equations.md
  - Assumptions & provenance: provenance.md
  - API reference: api.md

markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.snippets:
      base_path: ["."]
      check_paths: true
  - toc:
      permalink: true

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_source: false
            show_root_heading: true
            members_order: source

hooks:
  - docs/gen_provenance.py
